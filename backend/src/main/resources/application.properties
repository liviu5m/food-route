spring.application.name=foodroute

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema="food-route"

security.jwt.secret-key =${JWT_SECRET_KEY}
security.jwt.expiration-time=86400000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
logging.level.org.springframework.security=DEBUG

cloudinary.cloud_name=${CLOUD_NAME}
cloudinary.api_key=${CLOUD_API_KEY}
cloudinary.api_secret=${CLOUD_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

brevo.api-key=${BREVO_API_KEY}
brevo.url=${BREVO_URL}
brevo.support-email=${SUPPORT_EMAIL}

stripe.api.key=${STRIPE_API_KEY}

email.admin=${SUPPORT_EMAIL}
spring.redirect-url=${REDIRECT_URL}


spring.config.import=optional:file:.env[.properties]